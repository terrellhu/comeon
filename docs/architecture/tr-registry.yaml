  # ─── PTS — Parry & Telegraph System (design/gdd/parry-telegraph-system.md) ───
  - id: TR-PTS-001
    system: parry-telegraph-system
    gdd: design/gdd/parry-telegraph-system.md
    requirement: "Consumes attack_telegraphed(type: AttackType, damage: float) and transitions IDLE -> TELEGRAPHING"
    created: 2026-06-01
    revised: ""
    status: active
  - id: TR-PTS-002
    system: parry-telegraph-system
    gdd: design/gdd/parry-telegraph-system.md
    requirement: "Three attack types LIGHT/HEAVY/SWEEP with telegraph (0.8/1.2/1.5s), window width (0.30/0.35/0.45s), stagger (1.0/1.5/2.0s)"
    created: 2026-06-01
    revised: ""
    status: active
  - id: TR-PTS-003
    system: parry-telegraph-system
    gdd: design/gdd/parry-telegraph-system.md
    requirement: "Window opens at window_open_fraction (0.50) of telegraph_duration: window_open_time = telegraph_duration*fraction; window_close_time = open + width"
    created: 2026-06-01
    revised: ""
    status: active
  - id: TR-PTS-004
    system: parry-telegraph-system
    gdd: design/gdd/parry-telegraph-system.md
    requirement: "Parry success = TELEGRAPHING AND window_open_time <= telegraph_timer <= window_close_time (closed interval, boundaries succeed)"
    created: 2026-06-01
    revised: ""
    status: active
  - id: TR-PTS-005
    system: parry-telegraph-system
    gdd: design/gdd/parry-telegraph-system.md
    requirement: "Path A success emits parry_succeeded(attack_type); cancels telegraph; does not call apply_damage; returns to IDLE"
    created: 2026-06-01
    revised: ""
    status: active
  - id: TR-PTS-006
    system: parry-telegraph-system
    gdd: design/gdd/parry-telegraph-system.md
    requirement: "Path B failure: telegraph expires with no success -> apply_damage(PLAYER, damage) + parry_failed(attack_type)"
    created: 2026-06-01
    revised: ""
    status: active
  - id: TR-PTS-007
    system: parry-telegraph-system
    gdd: design/gdd/parry-telegraph-system.md
    requirement: "Emits parry_failed(attack_type) to Boss state machine on attack landing"
    created: 2026-06-01
    revised: ""
    status: active
  - id: TR-PTS-008
    system: parry-telegraph-system
    gdd: design/gdd/parry-telegraph-system.md
    requirement: "Every parry_input_pressed (path A/B/C) emits exit_parry_state(parry_animation_duration) same frame"
    created: 2026-06-01
    revised: ""
    status: active
  - id: TR-PTS-009
    system: parry-telegraph-system
    gdd: design/gdd/parry-telegraph-system.md
    requirement: "Emits telegraph_updated(progress, window_open, attack_type) every physics frame during TELEGRAPHING; progress strictly in [0,1]"
    created: 2026-06-01
    revised: ""
    status: active
  - id: TR-PTS-010
    system: parry-telegraph-system
    gdd: design/gdd/parry-telegraph-system.md
    requirement: "STAGGERING state removed; stagger lifecycle (stagger_timer, stagger_ended) owned by CounterAttackComboSystem; system returns IDLE after parry success"
    created: 2026-06-01
    revised: ""
    status: active
  - id: TR-PTS-011
    system: parry-telegraph-system
    gdd: design/gdd/parry-telegraph-system.md
    requirement: "All timing values (telegraph_duration, window_open_fraction, window_width, stagger_duration) injected, not literals; per-Boss override permitted per GDD formula 1"
    created: 2026-06-01
    revised: ""
    status: active
  - id: TR-PTS-012
    system: parry-telegraph-system
    gdd: design/gdd/parry-telegraph-system.md
    requirement: "Second attack_telegraphed while TELEGRAPHING is rejected with warning; existing timer unchanged"
    created: 2026-06-01
    revised: ""
    status: active
  - id: TR-PTS-013
    system: parry-telegraph-system
    gdd: design/gdd/parry-telegraph-system.md
