    revised: ""
    status: active
  - id: TR-PTS-014
    system: parry-telegraph-system
    gdd: design/gdd/parry-telegraph-system.md
    requirement: "Path A signal-to-output latency <= 0.5ms at 60fps"
    created: 2026-06-01
    revised: ""
    status: active

