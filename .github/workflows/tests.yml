name: Automated Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run GUT Tests (Godot 4.6)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Run GUT Tests
        uses: MikeSchulze/gdUnit4-action@v1
        with:
          godot-version: '4.6'
          paths: |
            tests/unit
            tests/integration
          report-name: test-results
          timeout: 600

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: reports/
          retention-days: 30
